name: AFK Earn

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: false
        default: '120'
  schedule:
    - cron: '15 */3 * * *'

permissions:
  actions: write
  contents: read

jobs:
  earn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install seleniumbase
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Install and Start sing-box
        env:
          SING_BOX_CONFIG: ${{ secrets.SING_BOX_CONFIG }}
        run: |
          echo "Downloading sing-box..."
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.13/sing-box-1.13.13-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-1.13.13-linux-amd64/sing-box /usr/local/bin/
          rm -rf sing-box.tar.gz sing-box-1.13.13-linux-amd64

          mkdir -p ~/.config/sing-box
          if [ -z "$SING_BOX_CONFIG" ]; then
            echo "ERROR: Please set the SING_BOX_CONFIG secret in your repository settings."
            exit 1
          fi
          echo "$SING_BOX_CONFIG" > ~/.config/sing-box/config.json

          echo "Starting sing-box in background..."
          sudo sing-box run -c ~/.config/sing-box/config.json > sing-box.log 2>&1 &

          sleep 3
          if pgrep -x "sing-box" > /dev/null; then
            echo "sing-box started successfully!"
          else
            echo "sing-box failed to start! Log content:"
            cat sing-box.log
            exit 1
          fi

          echo "Creating IP mask script..."
          printf '%s\n' 'import re,sys' 'for line in sys.stdin:' '  m=re.search(r"ip=(\d+\.\d+\.\d+\.\d+)",line)' '  if m:' '    ip=m.group(1)' '    d=ip.replace(".","")' '    mk="".join(c if i==1 or i==len(d)-2 else "*" for i,c in enumerate(d))' '    ps=ip.split(".");pos=0;r=[]' '    for p in ps:' '      r.append(mk[pos:pos+len(p)]);pos+=len(p)' '    print("ip="+".".join(r))' '  else:' '    print(line,end="")' > /tmp/mask_ip.py

          echo "Verifying proxy connection..."
          for i in {1..10}; do
            if curl -s --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace > /dev/null; then
              echo "Proxy is working!"
              curl --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | python3 /tmp/mask_ip.py
              break
            fi
            echo "Waiting for proxy to respond..."
            sleep 2
          done

      - name: Run AFK Earn
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WARP_PROXY: "socks5://127.0.0.1:40000"
          MAX_RUNTIME: ${{ github.event.inputs.duration || '120' }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freeze_afk.py

      - name: Upload Screenshots (Debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: freezehost-screenshots
          path: screenshots/
          retention-days: 3

      - name: Clean Up Workflow Run History
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
